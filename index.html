<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f7f6f3;
      color: #111;
    }
  </style>
</head>

<body>

<!-- NAV -->
<header class="max-w-[1100px] mx-auto px-6 pt-10 pb-16 flex justify-between text-sm">
  <div>James Dowland</div>
  <nav class="flex gap-8 text-gray-500">
    <a href="index.html" class="text-black border-b-2 border-black pb-1">Collection 1</a>
    <a href="work.html">Collection 2</a>
    <a href="about.html">About</a>
  </nav>
</header>

<!-- CONTENT -->
<main class="max-w-[1100px] mx-auto px-6">

  <!-- TITLE -->
  <section class="mb-24 max-w-xl">
    <h1 class="text-lg mb-4">Microsystems of Control</h1>
    <p class="text-gray-500 text-sm leading-relaxed">
      Collage work exploring systems, interfaces, and the mechanisms that shape behaviour.
    </p>
  </section>

  <!-- WORK -->
  <section class="space-y-32">

    <!-- IMAGE -->
<figure class="max-w-[900px]">
  <img src="img/failiure_by_design.jpg" class="w-full" alt="An older woman stands on a stool below a large “Submit claim” button, beside a notice saying there are zero days left." />
<figcaption class="mt-3 text-xs text-gray-400 leading-relaxed">
  <span class="block font-medium text-gray-600 tracking-wide uppercase">
    Failure by Design
  </span>
  <span>
    The process asks for action after time has already run out.
  </span>
</figcaption>
</figure>

<figure class="max-w-[900px]">
  <img src="img/categorical_denial.jpg" class="w-full" alt="A person falls toward labelled folders such as “low value applicants,” “high risk pool,” and “out of network.”" />
<figcaption class="mt-3 text-xs text-gray-400 leading-relaxed">
  <span class="block font-medium text-gray-600 tracking-wide uppercase">
    Categorical Denial
  </span>
  <span>
    People are sorted into folders they cannot escape.
  </span>
</figcaption>
</figure>

<figure class="max-w-[900px]">
  <img src="img/low_battery.jpg" class="w-full" alt="A delivery rider lies across a large empty battery icon near a scooter and a low delivery rating." />
<figcaption class="mt-3 text-xs text-gray-400 leading-relaxed">
  <span class="block font-medium text-gray-600 tracking-wide uppercase">
    Running on Empty
  </span>
  <span>
The worker is drained while the platform asks for feedback.  </span>
</figcaption>
</figure>

<figure class="max-w-[900px]">
  <img src="img/service_unavailable.jpg" class="w-full" alt="A small person hangs from a large tilted error window that says the system is unavailable." />
<figcaption class="mt-3 text-xs text-gray-400 leading-relaxed">
  <span class="block font-medium text-gray-600 tracking-wide uppercase">
    Service Unavailable
  </span>
  <span>
    A system error becomes a physical obstacle.
  </span>
</figcaption>
</figure>

<figure class="max-w-[900px]">
  <img src="img/fitness_tracker.jpg" class="w-full" alt="An older woman stands on a stool below a large “A woman stands inside large circular progress rings above a weekly activity report showing a drop from last week." />
<figcaption class="mt-3 text-xs text-gray-400 leading-relaxed">
  <span class="block font-medium text-gray-600 tracking-wide uppercase">
    Infinite Loop
  </span>
  <span>
    Activity is measured, repeated, and reduced.
  </span>
</figcaption>
</figure>

<figure class="max-w-[900px]">
  <img src="img/password_compromised.jpg" class="w-full" alt="A man walks under a login screen while carrying a long password bar, with a warning about compromised passwords." />
<figcaption class="mt-3 text-xs text-gray-400 leading-relaxed">
  <span class="block font-medium text-gray-600 tracking-wide uppercase">
    System Oversight
  </span>
  <span>
    A password is stolen plain sight.
  </span>
</figcaption>
</figure>

<figure class="max-w-[900px]">
  <img src="img/star_rating.jpg" class="w-full" alt="A man holds a yellow star below a row of review stars, with the message “Your rating has been recorded — 2 stars.”" />
<figcaption class="mt-3 text-xs text-gray-400 leading-relaxed">
  <span class="block font-medium text-gray-600 tracking-wide uppercase">
   Feedback Received
  </span>
  <span>
    A low rating becomes something heavy to carry.
  </span>
</figcaption>
</figure>
  </section>

</main>

<!-- FOOTER -->
<footer class="max-w-[1100px] mx-auto px-6 py-20 text-sm text-gray-400">
  <p>© James Dowland</p>
</footer>

</body>
</html>
